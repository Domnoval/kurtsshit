<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TCCYG · Admin</title>
<link rel="icon" href="assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Inter:wght@400;500;600;700&family=Roboto+Slab:wght@400;700;900&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #0a0d10;
  --bg-elevated: #141820;
  --bg-input: #1c2128;
  --fg: #f8f9fa;
  --fg-muted: #a1a1aa;
  --fg-dim: rgba(248, 249, 250, 0.55);
  --accent: #ff9f1c;
  --accent-hover: #ffae3d;
  --accent-dim: rgba(255, 159, 28, 0.2);
  --nature: #6b8f5e;
  --danger: #e5484d;
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.16);
  --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.5);
  --shadow-lg: 0 30px 60px rgba(0, 0, 0, 0.6);
  --font-display: 'Roboto Slab', Georgia, serif;
  --font-heading: 'Outfit', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
button { font-family: inherit; cursor: pointer; }
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }

/* ─── LOGIN ────────────────────────────────────────────────────────── */
.login-stage {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem;
  background:
    radial-gradient(ellipse 60% 40% at 50% 40%, rgba(255, 159, 28, 0.08), transparent 70%),
    radial-gradient(ellipse 80% 60% at 50% 60%, rgba(10, 13, 16, 0.6), transparent 100%),
    #0a0d10;
}
.login-card {
  width: 100%; max-width: 420px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3rem 2.5rem;
  box-shadow: var(--shadow-lg);
}
.login-mark {
  width: 56px; height: 56px;
  border-radius: 6px;
  background: radial-gradient(circle at 45% 55%, rgba(255,159,28,0.95), rgba(255,159,28,0.15) 60%, transparent 75%), #0a0d10;
  border: 1px solid rgba(255,255,255,0.15);
  margin: 0 auto 1.5rem;
  position: relative; overflow: hidden;
}
.login-mark::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,159,28,0.9) 50%, transparent 60%);
  filter: blur(1px);
}
.login-eyebrow {
  text-align: center;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.login-title {
  text-align: center;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.75rem;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  margin: 0 0 0.5rem;
}
.login-sub {
  text-align: center;
  color: var(--fg-muted);
  font-size: 0.9rem;
  margin: 0 0 2rem;
}

/* ─── FIELDS ─────────────────────────────────────────────────────────── */
.field { display: flex; flex-direction: column; margin-bottom: 1.25rem; }
.field label, .field-label {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-bottom: 0.5rem;
}
.field input, .field textarea, .field select {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.75rem 0.9rem;
  font-family: var(--font-body);
  font-size: 0.95rem;
  color: var(--fg);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255, 159, 28, 0.12);
}
.field textarea { resize: vertical; min-height: 80px; font-family: var(--font-body); line-height: 1.5; }
.field-help { font-size: 0.75rem; color: var(--fg-dim); margin-top: 0.4rem; font-style: italic; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 640px) { .field-row { grid-template-columns: 1fr; } }

/* ─── BUTTONS ────────────────────────────────────────────────────────── */
.btn {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  padding: 0.9rem 1.5rem;
  border-radius: 4px;
  border: none;
  display: inline-flex; align-items: center; gap: 0.5rem;
  transition: transform .2s, background .2s, box-shadow .2s, opacity .2s;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #0a0d10; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255, 159, 28, 0.35); }
.btn-secondary { background: rgba(255, 255, 255, 0.06); color: var(--fg); border: 1px solid var(--border-strong); }
.btn-secondary:hover:not(:disabled) { background: rgba(255, 255, 255, 0.10); border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(229, 72, 77, 0.15); color: var(--danger); border: 1px solid rgba(229, 72, 77, 0.3); }
.btn-danger:hover:not(:disabled) { background: rgba(229, 72, 77, 0.25); }
.btn-small { padding: 0.5rem 0.9rem; font-size: 0.65rem; }
.btn-full { width: 100%; justify-content: center; }

/* ─── ADMIN APP SHELL ────────────────────────────────────────────────── */
.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  grid-template-columns: 260px 1fr;
  grid-template-areas: "topbar topbar" "sidebar main" "savebar savebar";
}
@media (max-width: 760px) {
  .app-shell { grid-template-columns: 1fr; grid-template-areas: "topbar" "sidebar" "main" "savebar"; }
}

.topbar {
  grid-area: topbar;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.85rem 1.5rem;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 5;
}
.brand-mark-small {
  display: flex; align-items: center; gap: 0.75rem;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 0.95rem;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.brand-mark-small .mark {
  width: 28px; height: 28px;
  border-radius: 4px;
  background: radial-gradient(circle at 45% 55%, rgba(255,159,28,0.95), rgba(255,159,28,0.15) 60%, transparent 75%), #0a0d10;
  border: 1px solid rgba(255,255,255,0.15);
}
.topbar-tag {
  font-family: var(--font-heading);
  font-weight: 400;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  padding-left: 0.5rem;
  border-left: 1px solid var(--border);
  margin-left: 0.5rem;
}
.topbar-user {
  display: flex; align-items: center; gap: 1rem;
  font-size: 0.8rem;
  color: var(--fg-muted);
}
.topbar-user .email { font-family: var(--font-mono); color: var(--fg); }

.sidebar {
  grid-area: sidebar;
  background: var(--bg);
  border-right: 1px solid var(--border);
  padding: 1.5rem 0;
  overflow-y: auto;
}
.sidebar-section-label {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--fg-dim);
  padding: 0 1.5rem;
  margin: 1.25rem 0 0.5rem;
}
.sidebar-section-label:first-child { margin-top: 0; }
.sidebar a {
  display: flex; align-items: center;
  padding: 0.7rem 1.5rem;
  color: var(--fg-muted);
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background .2s, color .2s, border-color .2s;
}
.sidebar a:hover { background: rgba(255, 255, 255, 0.03); color: var(--fg); }
.sidebar a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(255, 159, 28, 0.05); }

.main {
  grid-area: main;
  padding: 2.5rem 3rem 6rem;
  overflow-y: auto;
  max-width: 920px;
}
@media (max-width: 760px) { .main { padding: 1.5rem 1.25rem 6rem; } }

.section-h {
  margin: 0 0 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.section-h h1 {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 2rem;
  text-transform: uppercase;
  letter-spacing: -0.01em;
  margin: 0 0 0.5rem;
}
.section-h p { color: var(--fg-muted); margin: 0; font-size: 0.9rem; line-height: 1.5; }

/* ─── CARD (for repeating items) ─────────────────────────────────────── */
.card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.card-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.card-head h3 {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.1rem;
  text-transform: uppercase;
}
.card-head-actions { display: flex; gap: 0.5rem; align-items: center; }
.card-chev {
  font-family: var(--font-mono);
  color: var(--fg-dim);
  font-size: 0.9rem;
  transition: transform .2s;
}
.card.collapsed .card-chev { transform: rotate(-90deg); }
.card.collapsed .card-body { display: none; }

/* ─── KV LIST (specs) ────────────────────────────────────────────────── */
.kv-list { display: flex; flex-direction: column; gap: 0.5rem; }
.kv-row { display: grid; grid-template-columns: 1fr 1.5fr auto; gap: 0.5rem; }
.kv-row input { background: var(--bg-input); border: 1px solid var(--border); border-radius: 3px; padding: 0.5rem 0.7rem; color: var(--fg); font-size: 0.85rem; }
.kv-row button { background: transparent; border: 1px solid var(--border); color: var(--fg-dim); border-radius: 3px; padding: 0 0.7rem; cursor: pointer; }
.kv-row button:hover { color: var(--danger); border-color: var(--danger); }
.kv-add { font-size: 0.75rem; color: var(--accent); cursor: pointer; padding: 0.5rem 0; }

/* ─── IMAGE PICKER ───────────────────────────────────────────────────── */
.img-picker {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 1rem;
  align-items: start;
  background: var(--bg-input);
  border: 1px dashed var(--border-strong);
  border-radius: 4px;
  padding: 0.75rem;
}
.img-picker-preview {
  width: 80px; height: 80px;
  border-radius: 3px;
  background: rgba(0, 0, 0, 0.3);
  background-size: cover;
  background-position: center;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--fg-dim);
}
.img-picker-body { display: flex; flex-direction: column; gap: 0.5rem; }
.img-picker-body input {
  background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
  padding: 0.5rem 0.7rem; color: var(--fg); font-size: 0.8rem;
  font-family: var(--font-mono);
}
.img-picker-actions { display: flex; gap: 0.5rem; align-items: center; }
.img-picker-actions button { font-size: 0.7rem; padding: 0.4rem 0.7rem; }

/* ─── SAVEBAR ───────────────────────────────────────────────────────── */
.savebar {
  grid-area: savebar;
  position: sticky; bottom: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.5rem;
  background: var(--bg-elevated);
  border-top: 1px solid var(--border);
  box-shadow: 0 -6px 20px rgba(0, 0, 0, 0.4);
  z-index: 5;
}
.savebar-status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--fg-muted); }
.savebar-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--fg-dim);
}
.savebar.dirty .savebar-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.savebar.saving .savebar-dot { background: var(--accent); animation: pulse 1s infinite; }
.savebar.saved .savebar-dot { background: var(--nature); box-shadow: 0 0 8px var(--nature); }
.savebar.error .savebar-dot { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.savebar-actions { display: flex; gap: 0.75rem; }

/* ─── EMPTY / NOTICES ───────────────────────────────────────────────── */
.notice {
  background: rgba(255, 159, 28, 0.08);
  border: 1px solid rgba(255, 159, 28, 0.3);
  border-radius: 4px;
  padding: 1rem 1.25rem;
  color: var(--fg);
  font-size: 0.9rem;
  line-height: 1.55;
  margin-bottom: 1.5rem;
}
.notice-danger { background: rgba(229, 72, 77, 0.08); border-color: rgba(229, 72, 77, 0.3); color: var(--danger); }
.notice-success { background: rgba(107, 143, 94, 0.08); border-color: rgba(107, 143, 94, 0.3); color: var(--nature); }

/* loading */
.loader {
  width: 100%; min-height: 50vh;
  display: flex; align-items: center; justify-content: center;
  color: var(--fg-dim);
  font-family: var(--font-heading);
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
}

</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" data-presets="react">
// ══════════════════════════════════════════════════════════════════════
//  TCCYG · Admin
//
//  Plug in your Supabase URL + anon key below, then deploy this file
//  alongside the live site (e.g. at /admin.html). Magic-link login,
//  one editable JSON content document, per-section editor UIs.
// ══════════════════════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://edfekbdijevkglfuvjlb.supabase.co';      // ← will be patched by deploy step
const SUPABASE_ANON = 'sb_publishable_dKG7AR8ENFdsEDA3BkObSg_3MdEJ34E'; // ← will be patched by deploy step
const STORAGE_BUCKET = 'site-assets';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const { useState, useEffect, useRef, useCallback } = React;

// ── Generic deep set/get for nested fields ───────────────────────────
function deepSet(obj, path, value) {
  const keys = Array.isArray(path) ? path : path.split('.');
  const out = Array.isArray(obj) ? [...obj] : { ...obj };
  let cur = out;
  for (let i = 0; i < keys.length - 1; i++) {
    const k = keys[i];
    cur[k] = Array.isArray(cur[k]) ? [...cur[k]] : { ...cur[k] };
    cur = cur[k];
  }
  cur[keys[keys.length - 1]] = value;
  return out;
}
function deepGet(obj, path) {
  const keys = Array.isArray(path) ? path : path.split('.');
  return keys.reduce((o, k) => (o == null ? undefined : o[k]), obj);
}
const uid = () => Math.random().toString(36).slice(2, 9);

// ══ LOGIN ═════════════════════════════════════════════════════════════
function Login() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState(null);
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setBusy(true); setErr(null);
    const { error } = await sb.auth.signInWithPassword({
      email: email.trim().toLowerCase(),
      password,
    });
    setBusy(false);
    if (error) setErr(error.message);
    // success: Root's onAuthStateChange picks up the session and swaps in the editor
  };

  return (
    <div className="login-stage">
      <div className="login-card">
        <div className="login-mark" />
        <div className="login-eyebrow">TCCYG · Admin</div>
        <h1 className="login-title">Sign in</h1>
        <p className="login-sub">Enter your admin email and password.</p>
        <form onSubmit={submit}>
          <div className="field">
            <label>Email</label>
            <input
              type="email" required
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              placeholder="you@example.com"
              autoComplete="username" autoFocus
              disabled={busy}
            />
          </div>
          <div className="field">
            <label>Password</label>
            <input
              type="password" required
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              autoComplete="current-password"
              disabled={busy}
            />
          </div>
          {err && <div className="notice notice-danger">{err}</div>}
          <button className="btn btn-primary btn-full" type="submit" disabled={busy}>
            {busy ? 'Signing in…' : 'Sign in →'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ══ ATOMIC FIELD COMPONENTS ═══════════════════════════════════════════
function Field({ label, help, children }) {
  return (
    <div className="field">
      {label && <label>{label}</label>}
      {children}
      {help && <span className="field-help">{help}</span>}
    </div>
  );
}

function TextField({ label, value, onChange, help, multiline = false, type = 'text', ...rest }) {
  const Comp = multiline ? 'textarea' : 'input';
  return (
    <Field label={label} help={help}>
      <Comp
        type={multiline ? undefined : type}
        value={value ?? ''}
        onChange={(e) => onChange(e.target.value)}
        {...rest}
      />
    </Field>
  );
}

function CheckboxField({ label, value, onChange, help }) {
  return (
    <Field help={help}>
      <label style={{ display: 'flex', alignItems: 'center', gap: '.6rem', cursor: 'pointer', textTransform: 'none', letterSpacing: 0, color: 'var(--fg)', fontSize: '.9rem', fontWeight: 500 }}>
        <input type="checkbox" checked={!!value} onChange={(e) => onChange(e.target.checked)} style={{ accentColor: 'var(--accent)' }} />
        {label}
      </label>
    </Field>
  );
}

function NumberField({ label, value, onChange, min, max, step, help, suffix }) {
  return (
    <Field label={label} help={help}>
      <div style={{ display: 'flex', alignItems: 'center', gap: '.5rem' }}>
        <input type="number" value={value ?? 0} min={min} max={max} step={step}
               onChange={(e) => onChange(parseFloat(e.target.value) || 0)} style={{ width: '100%' }} />
        {suffix && <span style={{ color: 'var(--fg-dim)', fontFamily: 'var(--font-mono)', fontSize: '.85rem' }}>{suffix}</span>}
      </div>
    </Field>
  );
}

function SelectField({ label, value, onChange, options, help }) {
  return (
    <Field label={label} help={help}>
      <select value={value ?? ''} onChange={(e) => onChange(e.target.value)}>
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </Field>
  );
}

function ImageField({ label, value, onChange, help }) {
  const fileRef = useRef(null);
  const [uploading, setUploading] = useState(false);
  const [err, setErr] = useState(null);

  const handleUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setErr(null); setUploading(true);
    const ext = file.name.split('.').pop().toLowerCase();
    const key = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
    const { error } = await sb.storage.from(STORAGE_BUCKET).upload(key, file, { upsert: false, contentType: file.type });
    if (error) { setErr(error.message); setUploading(false); return; }
    const { data: pub } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(key);
    onChange(pub.publicUrl);
    setUploading(false);
    if (fileRef.current) fileRef.current.value = '';
  };

  return (
    <Field label={label} help={help}>
      <div className="img-picker">
        <div className="img-picker-preview" style={value ? { backgroundImage: `url(${value})` } : {}}>
          {!value && 'no image'}
        </div>
        <div className="img-picker-body">
          <input
            type="text" value={value ?? ''}
            onChange={(e) => onChange(e.target.value)}
            placeholder="image URL or assets/path.jpg"
          />
          <div className="img-picker-actions">
            <input ref={fileRef} type="file" accept="image/*" onChange={handleUpload} style={{ display: 'none' }} />
            <button type="button" className="btn btn-secondary btn-small"
                    onClick={() => fileRef.current?.click()} disabled={uploading}>
              {uploading ? 'Uploading…' : 'Upload new photo'}
            </button>
            {value && (
              <button type="button" className="btn btn-danger btn-small"
                      onClick={() => onChange(null)}>Clear</button>
            )}
          </div>
          {err && <div style={{ color: 'var(--danger)', fontSize: '.75rem' }}>{err}</div>}
        </div>
      </div>
    </Field>
  );
}

function KvListEditor({ label, value, onChange, kLabel = 'Label', vLabel = 'Value' }) {
  const items = Array.isArray(value) ? value : [];
  const update = (i, k, v) => onChange(items.map((it, j) => j === i ? { ...it, [k]: v } : it));
  const remove = (i) => onChange(items.filter((_, j) => j !== i));
  const add = () => onChange([...items, { k: '', v: '' }]);
  return (
    <Field label={label}>
      <div className="kv-list">
        {items.map((it, i) => (
          <div className="kv-row" key={i}>
            <input value={it.k ?? ''} placeholder={kLabel} onChange={(e) => update(i, 'k', e.target.value)} />
            <input value={it.v ?? ''} placeholder={vLabel} onChange={(e) => update(i, 'v', e.target.value)} />
            <button type="button" onClick={() => remove(i)}>×</button>
          </div>
        ))}
        <div className="kv-add" onClick={add}>+ Add row</div>
      </div>
    </Field>
  );
}

  const [admins, setAdmins] = useState([]);

    setLoading(true);

  useEffect(() => { refresh(); }, []);

  const remove = async (email) => {

  return (

function Admin({ session }) {
  const [content, setContent] = useState(null);
  const [original, setOriginal] = useState(null);
  const [section, setSection] = useState('hero');
  const [status, setStatus] = useState('idle'); // idle | dirty | saving | saved | error
  const [error, setError] = useState(null);

  useEffect(() => {
    (async () => {
      const { data, error } = await sb.from('site_content').select('content').eq('id', 1).single();
      if (error) { setError(error.message); return; }
      setContent(data.content); setOriginal(data.content);
    })();
  }, []);

  const isDirty = content && original && JSON.stringify(content) !== JSON.stringify(original);
  useEffect(() => {
    if (status === 'saved' && isDirty) setStatus('dirty');
    else if (status === 'idle' && isDirty) setStatus('dirty');
    else if (status === 'dirty' && !isDirty) setStatus('idle');
  }, [isDirty, status]);

  const save = async () => {
    setStatus('saving'); setError(null);
    const { error } = await sb.from('site_content').update({
      content,
      updated_by: session?.user?.email || 'unknown',
    }).eq('id', 1);
    if (error) { setError(error.message); setStatus('error'); return; }
    setOriginal(content);
    setStatus('saved');
    setTimeout(() => setStatus(prev => prev === 'saved' ? 'idle' : prev), 3000);
  };

  const discard = () => {
    if (!confirm('Discard all unsaved changes?')) return;
    setContent(original); setStatus('idle');
  };

  // Warn on close if dirty
  useEffect(() => {
    const handler = (e) => { if (isDirty) { e.preventDefault(); e.returnValue = ''; } };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [isDirty]);

  if (error && !content) return <div className="login-stage"><div className="login-card"><div className="notice notice-danger">Failed to load content: {error}</div></div></div>;
  if (!content) return <div className="loader">Loading content…</div>;

  const active = SECTIONS.find(s => s.id === section) || SECTIONS[0];
  const Editor = active.Comp;

  // group sidebar items
  const grouped = SECTIONS.reduce((acc, s) => {
    (acc[s.group] = acc[s.group] || []).push(s);
    return acc;
  }, {});

  return (
    <div className="app-shell">
      <header className="topbar">
        <div className="brand-mark-small">
          <div className="mark" />
          <span>TCCYG</span>
          <span className="topbar-tag">Admin</span>
        </div>
        <div className="topbar-user">
          <a href="/" target="_blank" rel="noopener" style={{ color: 'var(--fg-muted)' }}>↗ View site</a>
          <span className="email">{session?.user?.email}</span>
          <button className="btn btn-secondary btn-small" onClick={async () => { await sb.auth.signOut(); window.location.reload(); }}>Sign out</button>
        </div>
      </header>

      <nav className="sidebar">
        {Object.entries(grouped).map(([group, list]) => (
          <React.Fragment key={group}>
            <div className="sidebar-section-label">{group}</div>
            {list.map(s => (
              <a key={s.id} className={section === s.id ? 'active' : ''} onClick={() => setSection(s.id)}>{s.label}</a>
            ))}
          </React.Fragment>
        ))}
      </nav>

      <main className="main">
        <Editor data={content} set={setContent} session={session} />
      </main>

      <footer className={`savebar ${status}`}>
        <div className="savebar-status">
          <span className="savebar-dot" />
          {status === 'idle' && 'All changes saved.'}
          {status === 'dirty' && 'Unsaved changes.'}
          {status === 'saving' && 'Publishing to live site…'}
          {status === 'saved' && 'Saved. Live site is updated.'}
          {status === 'error' && (error || 'Save failed.')}
        </div>
        <div className="savebar-actions">
          <button className="btn btn-secondary" onClick={discard} disabled={!isDirty || status === 'saving'}>Discard</button>
          <button className="btn btn-primary" onClick={save} disabled={!isDirty || status === 'saving'}>
            {status === 'saving' ? 'Publishing…' : 'Publish'}
          </button>
        </div>
      </footer>
    </div>
  );
}

// ══ ROOT ══════════════════════════════════════════════════════════════
function Root() {
  const [session, setSession] = useState(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setReady(true); });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);

  if (!ready) return <div className="loader">Initializing…</div>;
  if (!session) return <Login />;
  return <Admin session={session} />;
}

ReactDOM.createRoot(document.getElementById('app')).render(<Root />);
</script>
</body>
